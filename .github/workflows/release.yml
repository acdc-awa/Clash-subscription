name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./front
        run: |
          npm ci
          npm run build

      - name: Prepare Release Bundle
        run: |
          mkdir -p release_bundle/app
          # Copy backend files
          cp -r backend release_bundle/app/
          # Copy frontend dist to backend public
          cp -r front/dist release_bundle/app/backend/public
          # Write the version
          echo "${{ github.ref_name }}" > release_bundle/app/backend/version.txt
          # Clean up unneeded files from backend
          rm -rf release_bundle/app/backend/node_modules
          # Create archive
          cd release_bundle
          tar -czf clash-panel-release.tar.gz app/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: release_bundle/clash-panel-release.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
