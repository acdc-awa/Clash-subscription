version: '3.8'

services:
  clash-sub-backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: clash-sub-backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/data.db
      - API_TOKEN=your_secure_api_token_here
      - PROXY_SECRET=your_vps_proxy_secret_here
      - NODE_ENV=production
