version: '3.8'

services:
  clash-sub-backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: clash-sub-backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/backend/.env
    environment:
      - PORT=3000
      - DB_PATH=/app/data/data.db
      - NODE_ENV=production
